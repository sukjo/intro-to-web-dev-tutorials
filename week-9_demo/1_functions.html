<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Functions Demo</title>
  </head>
  <body>
    <script>
      function printHello() {
        console.log("hello!");
      }

      printHello();

      function printMsg(msg) {
        console.log(`New message: ${msg}`);
      }

      printMsg("bonjour");
      printMsg("salam");
      printMsg("aloha");
    </script>
  </body>
</html>
