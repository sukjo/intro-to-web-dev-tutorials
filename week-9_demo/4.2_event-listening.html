<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Listening Demo</title>
    <style>
      .node {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 5rem;
        margin-bottom: 1rem;
        opacity: 0;
        transition: opacity ease-in 0.5s;
      }
      input[type="range"] {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="wwi" class="node">WWI</div>
    <div id="wwii" class="node">WWII</div>
    <div id="vietnam" class="node">Vietnam War</div>
    <div id="korea" class="node">Korean War</div>

    <input type="range" id="timeline" min="1910" max="1980" value="1950" />

    <script>
      const slider = document.getElementById("timeline");

      const wwi = document.getElementById("wwi");
      const wwii = document.getElementById("wwii");
      const vietnam = document.getElementById("vietnam");
      const korea = document.getElementById("korea");

      slider.addEventListener("input", function () {
        let year = slider.value;

        // WWI
        if (year >= 1914 && year <= 1918) {
          wwi.style.opacity = "1";
        } else {
          wwi.style.opacity = "0";
        }

        // WWII
        if (year >= 1939 && year <= 1945) {
          wwii.style.opacity = "1";
        } else {
          wwii.style.opacity = "0";
        }

        // Korean War
        if (year >= 1950 && year <= 1953) {
          korea.style.opacity = "1";
        } else {
          korea.style.opacity = "0";
        }

        // Vietnam War
        if (year >= 1955 && year <= 1975) {
          vietnam.style.opacity = "1";
        } else {
          vietnam.style.opacity = "0";
        }
      });
    </script>
  </body>
</html>
