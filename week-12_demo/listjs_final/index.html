<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List.js Demo</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="//cdnjs.cloudflare.com/ajax/libs/list.js/2.3.1/list.min.js"></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <div id="list-container">
      <menu>
        <input class="fuzzy-search" name="search" placeholder="Search..." />
        <div id="genre-filters">
          <div class="checkbox">
            <input type="checkbox" name="genre-filter" />
            <label>Fiction</label>
          </div>
          <button id="clear-filters">Reset filters</button>
        </div>
        <div id="sort-container">
          <button class="sort" data-sort="author_name">
            Sort by author (A-Z)
          </button>
          <button class="sort" data-sort="first_publish_year">
            Sort by publication year
          </button>
        </div>
      </menu>
      <ul class="list"></ul>
    </div>
  </body>
</html>
