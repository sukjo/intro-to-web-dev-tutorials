<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaflet Demo</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <!-- the "defer" above means the script will execute after the DOM is ready -->
    <!-- otherwise the browser has to wait for the script to download and execute the downloaded script, before processing the rest of the page -->
    <!-- "defer" is necessary here only because we're putting the <script> in the <head> instead of the <body> -->
  </head>
  <body>
    <h1>Known Revolts by Captured Africans</h1>
    <h2>During Voyages to Cuba in the Transatlantic Slave Trade</h2>
    <nav>
      <label>Explore by voyage:</label>
      <button id="back-btn">previous</button>
      <button id="fwd-btn">next</button>
    </nav>
  </body>
</html>
